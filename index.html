<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Streamer Pro - Premium futuristic media platform" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Streamer Pro</title>
  <style>
    html, body { background: #000 !important; color: #fff !important; margin: 0 !important; }
    #orb-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    #app { position: relative; z-index: 1; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="orb-container" aria-hidden="true"><div id="orb"></div><div id="orb-ring"></div></div>
  <div id="app">
    <header id="app-header">
      <div class="header-left"><div class="logo"><span class="logo-icon">◈</span><span class="logo-text">STREAMER<strong>PRO</strong></span></div></div>
      <div class="header-right">
        <a class="icon-btn" href="/admin.html" title="Admin Panel" aria-label="Admin Panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
        <button class="icon-btn" id="pip-btn" title="Picture-in-Picture" aria-label="Picture in Picture"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="13" y="12" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg></button>
        <button class="icon-btn" id="teleparty-btn" title="Watch Together" aria-label="Watch Together"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="18" cy="10" r="3"/></svg></button>
      </div>
    </header>
    <main id="main-content">
      <section id="video-mode" class="mode-section active">
        <div class="content-bar"><div class="search-wrap"><svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="video-search" placeholder="Search videos, streams..." autocomplete="off" /></div></div>
        <div id="video-player-section"><div id="video-container"><video id="main-video" playsinline preload="metadata"></video><div id="tap-overlay" class="tap-overlay" aria-hidden="true"></div><div id="video-controls" class="controls-overlay"><div class="controls-top"><span id="video-title-display" class="video-title-label">Select a video to play</span><div class="top-actions"><button class="ctrl-btn" id="fullscreen-btn" aria-label="Fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button></div></div><div class="controls-center"><button class="ctrl-btn large" id="skip-back-btn" aria-label="Rewind 10s"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15" text-anchor="middle" font-size="6" fill="white">10</text></svg></button><button class="ctrl-btn play-pause" id="play-pause-btn" aria-label="Play/Pause"><svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg><svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button><button class="ctrl-btn large" id="skip-fwd-btn" aria-label="Forward 10s"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15" text-anchor="middle" font-size="6" fill="white">10</text></svg></button></div><div class="controls-bottom"><div class="seek-container"><div id="seek-bar" class="seek-bar" role="slider" aria-label="Seek"><div id="seek-buffer" class="seek-buffer"></div><div id="seek-progress" class="seek-progress"></div><div id="seek-thumb" class="seek-thumb"></div></div></div><div class="time-volume-row"><span id="time-display" class="time-display">0:00 / 0:00</span><div class="volume-wrap"><button class="ctrl-btn small" id="mute-btn" aria-label="Mute"><svg id="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></button><input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume" /></div></div></div></div><div id="gesture-hint" class="gesture-hint" aria-hidden="true"></div></div><div id="stream-info" class="stream-info"><span id="format-badge" class="badge">—</span><span id="quality-badge" class="badge">AUTO</span><span id="buffer-status" class="badge dim">BUFFER: --</span><span id="hls-badge" class="badge dim" style="display:none">HLS</span></div></div>
        <div class="section-header"><h2 class="section-title">Library</h2></div>
        <div id="video-grid" class="card-grid"></div>
      </section>

      <!-- ========== MUSIC MODE ========== -->
      <section id="music-mode" class="mode-section">
        <!-- Album art + meta -->
        <div class="music-hero">
          <div class="album-art-wrap">
            <div id="album-ring" class="album-ring"></div>
            <div id="album-art" class="album-art"><div class="album-placeholder">♪</div></div>
          </div>
          <div class="music-meta">
            <p id="track-title" class="track-title">Select a track</p>
            <p id="track-artist" class="track-artist">—</p>
            <span id="music-live-badge" class="badge music-live-badge" style="display:none">● LIVE</span>
          </div>
        </div>

        <!-- Visualizer -->
        <div class="visualizer-wrap">
          <canvas id="visualizer" class="visualizer-canvas"></canvas>
        </div>

        <!-- Seek bar -->
        <div class="seek-container music-seek-wrap" id="music-seek-container">
          <div id="music-seek-bar" class="seek-bar">
            <div id="music-seek-progress" class="seek-progress" style="width:0%"></div>
            <div id="music-seek-thumb" class="seek-thumb" style="left:0%"></div>
          </div>
          <div class="music-time-row">
            <span id="music-current-time" class="time-display">0:00</span>
            <span id="music-duration" class="time-display">--:--</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="music-controls">
          <button id="shuffle-btn" class="ctrl-btn small" title="Shuffle" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
          </button>
          <button id="music-prev-btn" class="ctrl-btn large" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16"/></svg>
          </button>
          <button id="music-play-btn" class="ctrl-btn play-pause" aria-label="Play/Pause">
            <svg id="music-play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            <svg id="music-pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button id="music-next-btn" class="ctrl-btn large" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/></svg>
          </button>
          <button id="repeat-btn" class="ctrl-btn small" title="Repeat" aria-label="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>

        <!-- Playlist -->
        <div class="section-header" style="margin-top:24px">
          <h2 class="section-title">Playlist</h2>
        </div>
        <div id="playlist-container" class="playlist-list"></div>

        <!-- Add custom stream -->
        <div class="music-add-stream-wrap">
          <h3 class="music-add-title">Add Audio Stream</h3>
          <div class="music-add-row">
            <input type="url" id="music-stream-url" class="music-stream-input" placeholder="Paste .mp3 / .m3u8 / stream URL..." />
            <input type="text" id="music-stream-title" class="music-stream-input" placeholder="Title (optional)" />
            <button id="music-add-btn" class="primary-btn">Add</button>
          </div>
          <p class="music-add-hint">Supports MP3, AAC, M3U8, OGG, FLAC streams</p>
        </div>
      </section>
    </main>
    <div id="teleparty-panel" class="side-panel" aria-hidden="true"><div class="panel-header"><h3>Watch Together</h3><button class="icon-btn" id="close-party-btn" aria-label="Close panel">✕</button></div><div class="panel-body"><div id="party-create-join"><div class="form-group"><label>Your name</label><input type="text" id="party-name-input" placeholder="Enter your name..." maxlength="24" /></div><div class="form-group"><label>Create a room</label><button class="primary-btn full-width" id="create-room-btn">Create Room</button></div><div class="divider"><span>or</span></div><div class="form-group"><label>Join a room</label><input type="text" id="room-id-input" placeholder="Enter room ID..." /><button class="primary-btn full-width" id="join-room-btn">Join Room</button></div></div><div id="party-active" style="display:none"><div class="room-info"><span class="label">Room ID:</span><strong id="room-id-display"></strong><button class="ghost-btn small" id="copy-room-btn">Copy</button></div><div class="party-members"><span class="label">Members: </span><span id="party-count">1</span></div><div id="chat-messages" class="chat-messages"></div><div class="chat-input-row"><input type="text" id="chat-input" placeholder="Say something..." /><button class="primary-btn" id="send-chat-btn">Send</button></div><button class="ghost-btn full-width" id="leave-room-btn" style="margin-top:12px">Leave Room</button></div></div></div><div id="panel-overlay" class="panel-overlay" aria-hidden="true"></div><div id="toast-container" aria-live="polite"></div><nav id="bottom-nav" aria-label="Main navigation"><button class="nav-btn active" data-mode="video" aria-label="Video mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg><span>Video</span></button><button class="nav-btn" data-mode="music" aria-label="Music mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><span>Music</span></button></nav>
  </div>
  <audio id="main-audio" preload="metadata" crossorigin="anonymous"></audio>
  <script type="module" src="/app.js"></script>
</body>
</html>
