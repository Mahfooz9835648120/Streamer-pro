<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Streamer Pro - Premium futuristic media platform" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <title>Streamer Pro</title>
  <style>
    html, body { background: #000 !important; color: #fff !important; margin: 0 !important; }
    #orb-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    #app { position: relative; z-index: 1; min-height: 100vh; }
  </style>
</head>
<body>
  <!-- Anti-gravity orb background -->
  <div id="orb-container" aria-hidden="true">
    <div id="orb"></div>
    <div id="orb-ring"></div>
  </div>

  <!-- App shell -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">STREAMER<strong>PRO</strong></span>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="admin-btn" title="Admin Panel" aria-label="Admin Panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button class="icon-btn" id="pip-btn" title="Picture-in-Picture" aria-label="Picture in Picture">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="13" y="12" width="8" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="icon-btn" id="teleparty-btn" title="Watch Together" aria-label="Watch Together">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="18" cy="10" r="3"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content area -->
    <main id="main-content">

      <!-- VIDEO MODE -->
      <section id="video-mode" class="mode-section active">

        <!-- Search / Content bar -->
        <div class="content-bar">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="video-search" placeholder="Search videos, streams..." autocomplete="off" />
          </div>
        </div>

        <!-- Featured / Now Playing -->
        <div id="video-player-section">
          <div id="video-container">
            <video id="main-video" playsinline preload="metadata"></video>

            <!-- Tap overlay (BELOW controls in z-order — z-index: 1) -->
            <div id="tap-overlay" class="tap-overlay" aria-hidden="true"></div>

            <!-- Custom controls overlay (ABOVE tap-overlay — z-index: 2, pointer-events: none except children) -->
            <div id="video-controls" class="controls-overlay">
              <div class="controls-top">
                <span id="video-title-display" class="video-title-label">Select a video to play</span>
                <div class="top-actions">
                  <button class="ctrl-btn" id="fullscreen-btn" aria-label="Fullscreen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                  </button>
                </div>
              </div>

              <div class="controls-center">
                <button class="ctrl-btn large" id="skip-back-btn" aria-label="Rewind 10s">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="12" y="15" text-anchor="middle" font-size="6" fill="white">10</text></svg>
                </button>
                <button class="ctrl-btn play-pause" id="play-pause-btn" aria-label="Play/Pause">
                  <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                  <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="ctrl-btn large" id="skip-fwd-btn" aria-label="Forward 10s">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="12" y="15" text-anchor="middle" font-size="6" fill="white">10</text></svg>
                </button>
              </div>

              <div class="controls-bottom">
                <div class="seek-container">
                  <div id="seek-bar" class="seek-bar" role="slider" aria-label="Seek">
                    <div id="seek-buffer" class="seek-buffer"></div>
                    <div id="seek-progress" class="seek-progress"></div>
                    <div id="seek-thumb" class="seek-thumb"></div>
                  </div>
                </div>
                <div class="time-volume-row">
                  <span id="time-display" class="time-display">0:00 / 0:00</span>
                  <div class="volume-wrap">
                    <button class="ctrl-btn small" id="mute-btn" aria-label="Mute">
                      <svg id="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                    </button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
                  </div>
                </div>
              </div>
            </div>

            <!-- Gesture hint overlay -->
            <div id="gesture-hint" class="gesture-hint" aria-hidden="true"></div>
          </div>

          <!-- Stream quality indicator -->
          <div id="stream-info" class="stream-info">
            <span id="format-badge" class="badge">—</span>
            <span id="quality-badge" class="badge">AUTO</span>
            <span id="buffer-status" class="badge dim">BUFFER: --</span>
            <span id="hls-badge" class="badge dim" style="display:none">HLS</span>
          </div>
        </div>

        <!-- Content Library -->
        <div class="section-header">
          <h2 class="section-title">Library</h2>
          <div class="history-btn-wrap">
            <button class="ghost-btn" id="history-btn">History</button>
          </div>
        </div>

        <div id="video-grid" class="card-grid"></div>
      </section>

      <!-- MUSIC MODE -->
      <section id="music-mode" class="mode-section">
        <div class="music-now-playing">
          <div class="album-art-wrap">
            <div id="album-art" class="album-art">
              <div class="album-placeholder">♪</div>
            </div>
            <div class="album-ring" id="album-ring"></div>
          </div>
          <div class="track-info">
            <p id="track-title" class="track-title">No track selected</p>
            <p id="track-artist" class="track-artist">—</p>
          </div>
        </div>

        <canvas id="visualizer" class="visualizer"></canvas>

        <div class="music-controls">
          <div class="seek-container">
            <div id="music-seek-bar" class="seek-bar" role="slider" aria-label="Seek track">
              <div id="music-seek-progress" class="seek-progress"></div>
              <div id="music-seek-thumb" class="seek-thumb"></div>
            </div>
          </div>
          <div class="music-time-row">
            <span id="music-current-time" class="time-display">0:00</span>
            <span id="music-duration" class="time-display">0:00</span>
          </div>
          <div class="music-btn-row">
            <button class="ctrl-btn" id="shuffle-btn" aria-label="Shuffle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            </button>
            <button class="ctrl-btn large" id="music-prev-btn" aria-label="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="ctrl-btn play-pause" id="music-play-btn" aria-label="Play/Pause music">
              <svg id="music-play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="music-pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="ctrl-btn large" id="music-next-btn" aria-label="Next">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="ctrl-btn" id="repeat-btn" aria-label="Repeat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17,1 21,5 17,9"/><path d="M3,11V9a4,4,0,0,1,4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21,13v2a4,4,0,0,1-4,4H3"/></svg>
            </button>
          </div>
        </div>

        <div class="section-header">
          <h2 class="section-title">Playlist</h2>
        </div>
        <div id="playlist-container" class="playlist"></div>
      </section>

    </main>

    <!-- Admin Panel -->
    <div id="admin-panel" class="side-panel" aria-hidden="true">
      <div class="panel-header">
        <h3>Admin Panel</h3>
        <button class="icon-btn" id="close-admin-btn" aria-label="Close">✕</button>
      </div>
      <div class="panel-body">
        <p class="admin-subtitle">Add any streaming link — HLS, DASH, MP4, WebM and more are auto-detected.</p>

        <form id="admin-video-form" class="admin-form" autocomplete="off">
          <div class="form-group">
            <label for="admin-url">Stream / Video URL *</label>
            <div class="admin-url-row">
              <input type="url" id="admin-url" placeholder="https://example.com/stream.m3u8" required />
              <button type="button" class="ghost-btn small" id="admin-detect-btn">Detect</button>
            </div>
            <span class="admin-fmt-row">Format: <strong id="admin-detected-format">—</strong></span>
          </div>
          <div class="form-group">
            <label for="admin-title">Title</label>
            <input type="text" id="admin-title" placeholder="My Stream" />
          </div>
          <div class="form-group">
            <label for="admin-thumb">Thumbnail URL (optional)</label>
            <input type="url" id="admin-thumb" placeholder="https://example.com/thumb.jpg" />
          </div>
          <div class="form-group">
            <label for="admin-desc">Description (optional)</label>
            <input type="text" id="admin-desc" placeholder="Short description..." />
          </div>
          <button type="submit" class="primary-btn full-width">Add to Library</button>
        </form>

        <div class="admin-list-header">
          <h4>Custom Streams</h4>
        </div>
        <div id="admin-video-list" class="admin-list"></div>
      </div>
    </div>

    <!-- Teleparty Panel -->
    <div id="teleparty-panel" class="side-panel" aria-hidden="true">
      <div class="panel-header">
        <h3>Watch Together</h3>
        <button class="icon-btn" id="close-party-btn" aria-label="Close panel">✕</button>
      </div>
      <div class="panel-body">
        <div id="party-create-join">
          <div class="form-group">
            <label>Create a room</label>
            <button class="primary-btn full-width" id="create-room-btn">Create Room</button>
          </div>
          <div class="divider"><span>or</span></div>
          <div class="form-group">
            <label>Join a room</label>
            <input type="text" id="room-id-input" placeholder="Enter room ID..." />
            <button class="primary-btn full-width" id="join-room-btn">Join Room</button>
          </div>
        </div>

        <div id="party-active" style="display:none">
          <div class="room-info">
            <span class="label">Room ID:</span>
            <strong id="room-id-display"></strong>
            <button class="ghost-btn small" id="copy-room-btn">Copy</button>
          </div>
          <div class="party-members">
            <span class="label">Members: </span>
            <span id="party-count">1</span>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Say something..." />
            <button class="primary-btn" id="send-chat-btn">Send</button>
          </div>
          <button class="ghost-btn full-width" id="leave-room-btn" style="margin-top:12px">Leave Room</button>
        </div>
      </div>
    </div>
    <div id="panel-overlay" class="panel-overlay" aria-hidden="true"></div>

    <!-- Watch History Panel -->
    <div id="history-panel" class="side-panel" aria-hidden="true">
      <div class="panel-header">
        <h3>Watch History</h3>
        <button class="icon-btn" id="close-history-btn" aria-label="Close">✕</button>
      </div>
      <div class="panel-body">
        <div id="history-list" class="history-list"></div>
        <button class="ghost-btn full-width" id="clear-history-btn" style="margin-top:16px">Clear History</button>
      </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-mode="video" aria-label="Video mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Video</span>
      </button>
      <button class="nav-btn" data-mode="music" aria-label="Music mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Music</span>
      </button>
    </nav>

  </div>

  <!-- PiP mini player -->
  <div id="pip-player" class="pip-player" style="display:none" aria-label="Picture in Picture player">
    <video id="pip-video" playsinline></video>
    <div class="pip-controls">
      <button class="pip-btn" id="pip-play-btn" aria-label="Play/Pause">▶</button>
      <button class="pip-btn" id="pip-close-btn" aria-label="Close PiP">✕</button>
      <button class="pip-btn" id="pip-expand-btn" aria-label="Expand">⤢</button>
    </div>
  </div>

  <audio id="main-audio" preload="metadata" crossorigin="anonymous"></audio>

  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
