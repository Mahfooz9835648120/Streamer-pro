<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <title>Streamer Pro Admin</title>
  <style>
    html, body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
    body { min-height: 100vh; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    a { color: inherit; text-decoration: none; }
    .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .title { font-size: 22px; font-weight: 700; margin: 0; }
    .sub { color: #9e9e9e; margin-top: 8px; line-height: 1.5; }
    .admin-form { display: flex; flex-direction: column; gap: 14px; margin-top: 18px; }
    .row { display: flex; gap: 10px; align-items: center; }
    input, button, textarea { font: inherit; }
    input, textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; padding: 12px 14px; box-sizing: border-box; }
    textarea { min-height: 90px; resize: vertical; }
    button { border: 0; border-radius: 10px; padding: 12px 14px; background: #fff; color: #000; font-weight: 700; cursor: pointer; }
    .ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item { display: flex; gap: 12px; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; }
    .meta { min-width: 0; }
    .name { font-weight: 700; margin-bottom: 4px; }
    .url { color: #9e9e9e; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 680px; }
    .fmt { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 3px 8px; border-radius: 9999px; background: rgba(255,255,255,0.1); margin-bottom: 8px; }
    .small { font-size: 12px; color: #bdbdbd; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title">Streamer Pro Admin</h1>
        <div class="sub">Private page for managing public stream URLs.</div>
      </div>
      <a class="ghost" href="/">Back to app</a>
    </div>

    <div class="panel">
      <div class="small">Access is handled by the page itself. Add your own auth before deployment if you want stricter protection.</div>
      <form id="admin-form" class="admin-form">
        <div class="row">
          <input id="admin-url" type="url" placeholder="https://example.com/stream.m3u8" required />
          <button type="button" class="ghost" id="detect-btn">Detect</button>
        </div>
        <div class="small">Format: <strong id="detected-format">—</strong></div>
        <input id="admin-title" type="text" placeholder="Title" />
        <input id="admin-thumb" type="url" placeholder="Thumbnail URL (optional)" />
        <textarea id="admin-desc" placeholder="Description (optional)"></textarea>
        <button type="submit">Add stream</button>
      </form>
    </div>

    <div class="panel">
      <h2 class="title" style="font-size:18px;margin-bottom:14px;">Saved Streams</h2>
      <div id="admin-list" class="list"></div>
    </div>
  </div>
  <script type="module" src="/admin.js"></script>
</body>
</html>
